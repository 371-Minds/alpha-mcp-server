---
version: "2.0"

services:
  alpha-mcp-server:
    image: node:20-alpine
    command:
      - /bin/sh
      - -lc
    args:
      - npm install -g @371-minds/alpha-mcp-server && alpha-mcp-server
    env:
      - NODE_ENV=production
      - GPUBRIDGE_API_KEY=REPLACE_IF_USING_GPU_TOOLS
      - CDP_API_KEY_ID=REPLACE_IF_USING_CDP_TOOLS
      - CDP_API_KEY_SECRET=REPLACE_IF_USING_CDP_TOOLS
      - CDP_WALLET_SECRET=REPLACE_IF_USING_CDP_SIGNING
      - COINBASE_COMMERCE_API_KEY=REPLACE_IF_USING_COMMERCE_TOOLS
      - COINBASE_ADV_TRADE_API_KEY=REPLACE_IF_USING_MARKET_TOOLS
      - COINBASE_ADV_TRADE_SECRET=REPLACE_IF_USING_MARKET_TOOLS

profiles:
  compute:
    alpha-mcp-server:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    akash:
      pricing:
        alpha-mcp-server:
          denom: uakt
          amount: 100

deployment:
  alpha-mcp-server:
    akash:
      count: 1
